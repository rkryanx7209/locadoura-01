<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sistema Locadora 2.0 - Blindagem de Processos</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-light">

    <div id="conteudo-impressao" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow mb-4">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="mb-0">Locadora 🚘</h2>
                    </div>

                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Selecione o Carro:</label>
                            <select id="select-carro" class="form-select">
                                <option value="" disabled selected>Escolha um veículo da lista...</option>
                            </select>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Dias de Aluguel (para devolução):</label>
                            <input type="number" id="dias-aluguel" class="form-control"
                                placeholder="Quantidade de dias">
                        </div>

                        <div class="secao-vistoria mb-4">
                            <h6 class="fw-bold text-danger mb-3">VISTORIA DE DEVOLUÇÃO</h6>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="check-sujo">
                                <label class="form-check-label" for="check-sujo">Veículo está sujo (Taxa R$
                                    50,00)</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="check-riscado">
                                <label class="form-check-label" for="check-riscado">Possui riscos leves (Taxa R$
                                    150,00)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="check-danificado">
                                <label class="form-check-label" for="check-danificado">Danos graves ou amassados (Taxa
                                    R$ 300,00)</label>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button onclick="registrarAluguel()" class="btn btn-success btn-lg">Registrar
                                Aluguel</button>
                            <button onclick="registrarDevolucao()" class="btn btn-outline-danger">Registrar
                                Devolução</button>
                        </div>
                    </div>

                    <div class="card-footer bg-white text-center">
                        <div id="resultado" class="h6 mt-2 text-dark">Aguardando operação</div>
                    </div>
                </div>

                <div id="secao-comprovante" style="display:none;" class="box-container shadow p-4 bg-white">

                    <video id="videoPreview" autoplay playsinline style="width:100%; display:none;"></video>
                    <button id="btnCapturar" class="btn btn-primary w-100 mt-2" style="display:none;">Capturar
                        Foto</button>

                    <div class="text-center">
                        <h4 class="fw-bold">🔐 Portão de segurança</h4>
                        <div class="seguranca-grid">
                            <div id="origem" class="box-drag">
                                <span id="chave" class="chave" draggable="true">🔑</span>
                            </div>
                            <div id="destino" class="box-drag destino">Arraste a chave aqui</div>
                        </div>
                    </div>

                    <div id="painel-biometrico" style="display:none;">
                        <hr>
                        <h4 class="text-center">🎫 Verificação de identidade e 🚩 localização</h4>
                        <p class="text-center small">Selecione sua foto para vistoria ou tire sua foto</p>

                        <input type="file" id="inputFotoVistoria" class="form-control mb-3" accept="image/*">

                        <div class="wrapper-biometrico">
                            <div class="bloco-vistoria">
                                <p class="fw-bold">Foto Processada:</p>
                                <div class="display-box">
                                    <canvas id="canvasComprovante" class="canvas-comprovante"></canvas>
                                </div>
                            </div>
                            <div class="bloco-vistoria">
                                <p class="fw-bold">Localização atual:</p>
                                <div class="display-box">
                                    <img id="img-mapa" class="img-mapa" style="display:none;">
                                    <span id="mapa-placeholder">Aguardando localização...</span>
                                </div>
                            </div>
                        </div>
                        <div id="acesso" class="acesso text-center mt-3 text-muted">aguardando verificação...</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/seguranca.js"></script>
    <script src="js/ryan.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
